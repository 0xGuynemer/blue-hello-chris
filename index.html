<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Chris</title>
  <style>
    body {
      background: #0356e0;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      width: 100vw;
    }
    h1 {
      color: #ffe100;
      font-family: sans-serif;
      font-size: 3rem;
      text-align: center;
      cursor: pointer;
      margin: 0;
      transition: opacity 0.15s;
      user-select: none;
      z-index: 2;
      position: relative;
    }
    .explode span {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%,-50%);
      font-size: 3rem;
      font-family: sans-serif;
      color: #ffe100;
      pointer-events: none;
      opacity: 1;
      animation: explode 0.65s cubic-bezier(0.36,2,0.49,0.63) forwards;
    }
    @keyframes explode {
      to {
        opacity: 0;
        transform: translate(var(--x), var(--y)) rotate(var(--r)) scale(2.1);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="explodeText">Hello Chris</h1>
  </div>
  <script>
    const h1 = document.getElementById('explodeText');
    h1.addEventListener('click', function () {
      if (h1.classList.contains('running')) return;
      h1.classList.add('running');
      const text = h1.textContent;
      const container = h1.parentElement;
      h1.style.opacity = '0';
      // Explode effect
      for (let i = 0; i < text.length; i++) {
        const span = document.createElement('span');
        span.textContent = text[i] === ' ' ? '\u00A0' : text[i];
        const angle = 2 * Math.PI * (i / text.length);
        const dist = 120 + Math.random() * 60;
        span.style.setProperty('--x', `${Math.cos(angle) * dist}px`);
        span.style.setProperty('--y', `${Math.sin(angle) * dist}px`);
        span.style.setProperty('--r', `${(Math.random() - 0.5) * 2}turn`);
        container.appendChild(span);
      }
      setTimeout(() => {
        container.querySelectorAll('span').forEach(s => s.remove());
        h1.style.opacity = '1';
        h1.classList.remove('running');
      }, 700);
    });
  </script>
</body>
</html>
